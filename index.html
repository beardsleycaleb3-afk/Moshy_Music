<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moshy_Music</title>
<link rel="manifest" href="manifest.json">
<style>
    body { margin:0; background:#000; color:#fff; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
    #frame { flex:1; border:10px solid #fff; display:none; flex-direction:column; }
    #visual { flex:1; position:relative; border:5px solid #fff; }
    #backgrounds { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    #hud { height:80px; display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:8px; border:5px solid #fff; }
    .btn { border:5px solid #fff; background:#000; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:bold; touch-action:manipulation; }
</style>
</head>
<body>
<div id="splash" ontouchstart="startApp()" style="position:fixed; inset:0; display:flex; justify-content:center; align-items:center; cursor:pointer;"><h1>TOUCH TO START</h1></div>
<div id="frame">
  <div id="visual">
    <img id="backgrounds">
    <canvas id="gl-canvas"></canvas>
  </div>
  <div id="hud">
    <div class="btn" ontouchstart="p1()">©</div>
    <div class="btn" ontouchstart="p2()">°</div>
    <div class="btn" ontouchstart="p3()">∆</div>
    <div class="btn" ontouchstart="p4()">•</div>
    <div class="btn" ontouchstart="p5()">®</div>
  </div>
</div>
<audio id="audio"></audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r161/three.min.js"></script>
<script>
let audio = document.getElementById('audio');
let scene, camera, renderer, cores, bgInt;
const loader = new THREE.TextureLoader();

function startApp(){ document.getElementById('splash').style.display='none'; document.getElementById('frame').style.display='flex'; initThree(); }

function initThree(){
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.z = 10;
    renderer = new THREE.WebGLRenderer({canvas:document.getElementById('gl-canvas'), alpha:true});
    renderer.setSize(innerWidth, innerHeight);
    animate();
}

function animate(){ requestAnimationFrame(animate); renderer.render(scene, camera); }

function updateCores(src){
    if(cores) scene.remove(cores);
    cores = new THREE.Mesh(new THREE.SphereGeometry(1.2,32,32), new THREE.MeshBasicMaterial({map:loader.load(src)}));
    scene.add(cores);
}

function spawnSprites(folder, n, s) {
    const img = document.createElement('img');
    img.src = 'assets/music/'+folder+'/sprites/'+n+'p'+s+'.jpeg';
    img.style.cssText = 'position:absolute; width:100px; left:'+Math.random()*80+'%; top:'+Math.random()*80+'%;';
    document.getElementById('visual').appendChild(img);
    setTimeout(() => img.remove(), 2000);
}

function p1() {
    clearInterval(bgInt);
    audio.src = 'assets/music/synth/1.mp3'; audio.play();
    let s = 1;
    bgInt = setInterval(() => {
        document.getElementById('backgrounds').src = 'assets/music/synth/backgrounds/1b'+s+'.jpeg';
        updateCores('assets/music/synth/cores/1c'+s+'.jpeg');
        spawnSprites('synth', 1, s);
        s = (s >= 5) ? 1 : s + 1;
    }, 2758);
}

function p2() {
    clearInterval(bgInt);
    audio.src = 'assets/music/xray/2.mp3'; audio.play();
    let s = 1;
    bgInt = setInterval(() => {
        document.getElementById('backgrounds').src = 'assets/music/xray/backgrounds/2b'+s+'.jpeg';
        updateCores('assets/music/xray/cores/2c'+s+'.jpeg');
        spawnSprites('xray', 2, s);
        s = (s >= 5) ? 1 : s + 1;
    }, 2758);
}

function p3() {
    clearInterval(bgInt);
    audio.src = 'assets/music/volt/3.mp3'; audio.play();
    let s = 1;
    bgInt = setInterval(() => {
        document.getElementById('backgrounds').src = 'assets/music/volt/backgrounds/3b'+s+'.jpeg';
        updateCores('assets/music/volt/cores/3c'+s+'.jpeg');
        spawnSprites('volt', 3, s);
        s = (s >= 5) ? 1 : s + 1;
    }, 2758);
}

function p4() {
    clearInterval(bgInt);
    audio.src = 'assets/music/grid/4.mp3'; audio.play();
    let s = 1;
    bgInt = setInterval(() => {
        document.getElementById('backgrounds').src = 'assets/music/grid/backgrounds/4b'+s+'.jpeg';
        updateCores('assets/music/grid/cores/4c'+s+'.jpeg');
        spawnSprites('grid', 4, s);
        s = (s >= 5) ? 1 : s + 1;
    }, 3287);
}

function p5() {
    clearInterval(bgInt);
    audio.src = 'assets/music/horror/5.mp3'; audio.play();
    let s = 1;
    bgInt = setInterval(() => {
        document.getElementById('backgrounds').src = 'assets/music/horror/backgrounds/5b'+s+'.jpeg';
        updateCores('assets/music/horror/cores/5c'+s+'.jpeg');
        spawnSprites('horror', 5, s);
        s = (s >= 5) ? 1 : s + 1;
    }, 1951);
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
