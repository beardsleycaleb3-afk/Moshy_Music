<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moshy_Music</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin:0; background:#000; color:#fff; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
        #frame { flex:1; border:10px solid #fff; display:none; flex-direction:column; }
        #visual { flex:1; position:relative; border:5px solid #fff; }
        #backgrounds { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
        #gl-canvas { position:absolute; inset:0; width:100%; height:100%; z-index:2; }
        #hud { height:80px; display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:8px; border:5px solid #fff; }
        .btn { border:5px solid #fff; background:#000; color:#333; display:flex; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>
    <div id="splash" onclick="startApp()" style="position:fixed; inset:0; z-index:100; background:#000; display:flex; justify-content:center; align-items:center;"><h1>TOUCH TO START</h1></div>
    <div id="frame">
        <div id="visual"><img id="backgrounds"><canvas id="gl-canvas"></canvas></div>
        <div id="hud">
            <div class="btn" onclick="p1()">©</div>
            <div class="btn" onclick="p2()">°</div>
            <div class="btn" onclick="p3()">∆</div>
            <div class="btn" onclick="p4()">•</div>
            <div class="btn" onclick="p5()">®</div>
        </div>
    </div>
    <audio id="audio"></audio>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r161/three.min.js"></script>
    <script>
        let scene, camera, renderer, cores, bgInt;
        const audio = document.getElementById('audio');
        const loader = new THREE.TextureLoader();

        function startApp() { document.getElementById('splash').style.display='none'; document.getElementById('frame').style.display='flex'; initThree(); }
        function initThree() {
            const v = document.getElementById('visual');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, v.clientWidth/v.clientHeight, 0.1, 1000);
            camera.position.z = 10;
            renderer = new THREE.WebGLRenderer({canvas: document.getElementById('gl-canvas'), alpha: true});
            renderer.setSize(v.clientWidth, v.clientHeight);
            cores = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), new THREE.MeshBasicMaterial());
            scene.add(cores);
            animate();
        }
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }

        function run(f, n, t) {
            clearInterval(bgInt);
            audio.src = 'assets/music/'+f+'/'+n+'.mp3'; audio.play();
            let s = 1;
            bgInt = setInterval(() => {
                document.getElementById('backgrounds').src = 'assets/music/'+f+'/backgrounds/'+n+'b'+s+'.jpeg';
                loader.load('assets/music/'+f+'/cores/'+n+'c'+s+'.jpeg', (tex) => { cores.material.map = tex; cores.material.needsUpdate = true; });
                const sp = document.createElement('img'); sp.src = 'assets/music/'+f+'/sprites/'+n+'p'+s+'.jpeg';
                sp.style.cssText = 'position:absolute; width:100px; z-index:3; left:'+Math.random()*80+'%; top:'+Math.random()*80+'%;';
                document.getElementById('visual').appendChild(sp);
                setTimeout(() => sp.remove(), 2000);
                s = (s >= 5) ? 1 : s + 1;
            }, t);
        }

        function p1() { run('synth', 1, 2758); }
        function p2() { run('xray', 2, 2758); }
        function p3() { run('volt', 3, 2758); }
        function p4() { run('grid', 4, 3287); }
        function p5() { run('horror', 5, 1951); }

        if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
