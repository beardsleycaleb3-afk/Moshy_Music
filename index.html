<script>
// 4 jpeg particles – cardinal spiral + jpeg spawns jpeg
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize',()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;});

let particles = [];
const MAX = 64;
const PHI = 1.6180339887;

class SpriteParticle {
  constructor(x,y,imgSrc,level=0,dir=0){
    this.img = new Image();
    this.img.src = imgSrc;
    this.x=x;this.y=y;this.level=level;
    this.size=90*Math.pow(PHI,level);
    this.life=110-level*12;
    this.alpha=1;
    this.angle=dir*(Math.PI/2);
    this.spin=0.035;
    this.radius=20+level*15;
    this.speed=1.8+level*0.4;
  }
  update(){
    this.angle+=this.spin;
    this.radius+=this.speed;
    this.x=W/2+Math.cos(this.angle)*this.radius;
    this.y=H/2+Math.sin(this.angle)*this.radius;
    this.alpha-=0.009;
    this.life--;
    if(this.level<3&&this.life%22===0&&particles.length<MAX){
      for(let d=0;d<4;d++) particles.push(new SpriteParticle(this.x,this.y,this.img.src,this.level+1,d));
    }
  }
  draw(){
    if(!this.img.complete)return;
    ctx.globalAlpha=this.alpha;
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);
    ctx.drawImage(this.img,-this.size/2,-this.size/2,this.size,this.size);
    ctx.restore();
  }
}

function spawn4(currentSrc){
  for(let d=0;d<4;d++){
    if(particles.length>=MAX)break;
    particles.push(new SpriteParticle(W/2,H/2,currentSrc,0,d));
  }
}

function animate(){
  ctx.clearRect(0,0,W,H);
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.update();
    if(p.alpha>0.02&&p.life>0)p.draw();
    else particles.splice(i,1);
  }
  requestAnimationFrame(animate);
}
animate();

// Hardcoded cycles
let bgInt,coreInt,spriteInt;
function stopLoops(){clearInterval(bgInt);clearInterval(coreInt);clearInterval(spriteInt);}

function startCycle1(){
  stopLoops();
  const ms=60000/87*4;
  let i=0;
  const cycle=()=>{
    i=(i+1)%5;
    bg.src=`assets/music/synth/backgrounds/1b${i+1}.jpeg`;
    sprite.src=`assets/music/synth/sprites/1p${i+1}.jpeg`;

    spawn4(`assets/music/synth/sprites/1p${i+1}.jpeg`);
  };
  bgInt=coreInt=spriteInt=setInterval(cycle,ms);
  cycle();
}
