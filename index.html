<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moshy_Music</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#splash{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
#splash h1{font-size:2.8rem;margin-bottom:1.5rem}
#splash p{font-size:1.6rem;color:#0f0;padding:1rem;border:3px solid #0f0;border-radius:12px}
#frame{display:none;flex-direction:column;height:100vh;border:10px solid var(--accent)}
#visual{flex:1;position:relative;background:#000;overflow:hidden}
.layer{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none}
#bg{opacity:1}
#gl-canvas{position:absolute;inset:0}
#particles{position:absolute;inset:0;pointer-events:none}
#hud{height:80px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:8px;background:#111}
.btn{border:8px solid var(--accent);border-radius:50%;background:#000;color:var(--accent);font-size:24px;font-weight:bold;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.btn.active{background:var(--accent);color:#000}
:root{--accent:#fff}
</style>
</head>
<body>

<div id="splash">
  <h1>TOUCH HERE FOR A GOOD TIME</h1>
  <p ontouchstart="startApp()">TAP TO START</p>
</div>

<div id="frame">
  <div id="visual">
    <img id="bg" class="layer">
    <canvas id="gl-canvas"></canvas>
    <canvas id="particles"></canvas>
  </div>
  <div id="hud">
    <div class="btn" ontouchstart="play1()">©</div>
    <div class="btn" ontouchstart="play2()">°</div>
    <div class="btn" ontouchstart="play3()">∆</div>
    <div class="btn" ontouchstart="play4()">•</div>
    <div class="btn" ontouchstart="play5()">®</div>
  </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
const audio = document.getElementById('audio');
let scene,camera,renderer,core,analyser,dataArray,audioCtx,source;
const loader = new THREE.TextureLoader();
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
pCanvas.width = innerWidth;
pCanvas.height = innerHeight;
let particles = [];
const MAX_PART = 64;
const PHI = 1.6180339887;

function startApp(){
  document.getElementById('splash').style.display='none';
  document.getElementById('frame').style.display='flex';
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
  initThree();
  initAudio();
  audio.play().catch(()=>0);
}

function initThree(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  camera.position.z = 5;
  renderer = new THREE.WebGLRenderer({canvas:document.getElementById('gl-canvas'),alpha:true});
  renderer.setSize(innerWidth,innerHeight);
  animateCore();
}

function updateCore(tex){
  if(core) scene.remove(core);
  core = new THREE.Mesh(new THREE.SphereGeometry(2.2,32,32),new THREE.MeshBasicMaterial({map:loader.load(tex)}));
  scene.add(core);
}

function animateCore(){
  requestAnimationFrame(animateCore);
  if(analyser && dataArray){
    analyser.getByteFrequencyData(dataArray);
    const low  = dataArray.slice(0,20).reduce((a,b)=>a+b,0)/(20*255)||0;
    const mid  = dataArray.slice(20,60).reduce((a,b)=>a+b,0)/(40*255)||0;
    const high = dataArray.slice(60).reduce((a,b)=>a+b,0)/((dataArray.length-60)*255)||0;
    if(core){
      core.material.color.setRGB(low,mid,high);
      core.scale.setScalar(1 + low*0.8 + mid*0.4);
      core.rotation.y += 0.008 + low*0.03;
      core.rotation.x += 0.003 + high*0.02;
    }
  }
  renderer.render(scene,camera);
}

function initAudio(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

class SpriteParticle {
  constructor(x,y,src,level=0,dir=0){
    this.img=new Image();this.img.src=src;
    this.x=x;this.y=y;this.level=level;
    this.size=30*Math.pow(PHI,level);
    this.life=90-level*10;
    this.alpha=0.6;
    this.angle=dir*(Math.PI/2);
    this.spin=0.04;
    this.radius=12+level*8;
    this.speed=1.4+level*0.3;
    this.trail=[];
    this.trailLength=8;
  }
  update(){
    this.angle+=this.spin;
    this.radius+=this.speed;
    this.x=innerWidth/2+Math.cos(this.angle)*this.radius;
    this.y=innerHeight/2+Math.sin(this.angle)*this.radius;
    this.alpha-=0.01;this.life--;
    this.trail.push({x:this.x,y:this.y,alpha:this.alpha});
    if(this.trail.length>this.trailLength)this.trail.shift();
    if(this.level<3&&this.life%25===0&&particles.length<MAX_PART){
      for(let d=0;d<3;d++)particles.push(new SpriteParticle(this.x,this.y,this.img.src,this.level+1,d));
    }
  }
  draw(){
    if(!this.img.complete)return;
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i];
      const ta=this.alpha*(i/this.trailLength)*0.4;
      pCtx.globalAlpha=ta;
      pCtx.save();
      pCtx.translate(t.x,t.y);
      pCtx.rotate(this.angle);
      pCtx.drawImage(this.img,-this.size/2,-this.size/2,this.size,this.size);
      pCtx.restore();
    }
    pCtx.globalAlpha=this.alpha;
    pCtx.save();
    pCtx.translate(this.x,this.y);
    pCtx.rotate(this.angle);
    pCtx.drawImage(this.img,-this.size/2,-this.size/2,this.size,this.size);
    pCtx.restore();
  }
}

function spawn4(src){
  for(let d=0;d<4;d++){
    if(particles.length>=MAX_PART)break;
    particles.push(new SpriteParticle(innerWidth/2,innerHeight/2,src,0,d));
  }
}

function animateP(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  if(analyser&&dataArray){
    analyser.getByteFrequencyData(dataArray);
    const energy=dataArray.reduce((a,b)=>a+b,0)/(dataArray.length*255)||0;
    if(energy>0.35&&Math.random()<0.08)spawn4(document.getElementById('bg').src.replace('b','p').replace('backgrounds','sprites'));
  }
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.update();
    if(p.alpha>0.02&&p.life>0)p.draw();
    else particles.splice(i,1);
  }
  requestAnimationFrame(animateP);
}
animateP();

let bgInt;
function stopLoops(){clearInterval(bgInt);}

function play1(){
  document.documentElement.style.setProperty('--accent','#00ffff');
  document.querySelectorAll('.btn').forEach(b=>b.classList.toggle('active',b.innerText==='©'));
  audio.src='assets/music/synth/1.mp3';audio.play();
  document.getElementById('bg').src='assets/music/synth/backgrounds/1b1.jpeg';
  updateCore('assets/music/synth/cores/1c1.jpeg');
  spawn4('assets/music/synth/sprites/1p1.jpeg');
  stopLoops();
  const d=audio.duration*1000||300000;
  const t=d/5;
  let s=0;
  bgInt=setInterval(()=>{
    s++;
    if(s===1){document.getElementById('bg').src='assets/music/synth/backgrounds/1b2.jpeg';updateCore('assets/music/synth/cores/1c2.jpeg');spawn4('assets/music/synth/sprites/1p2.jpeg');}
    if(s===2){document.getElementById('bg').src='assets/music/synth/backgrounds/1b3.jpeg';updateCore('assets/music/synth/cores/1c3.jpeg');spawn4('assets/music/synth/sprites/1p3.jpeg');}
    if(s===3){document.getElementById('bg').src='assets/music/synth/backgrounds/1b4.jpeg';updateCore('assets/music/synth/cores/1c4.jpeg');spawn4('assets/music/synth/sprites/1p4.jpeg');}
    if(s===4){document.getElementById('bg').src='assets/music/synth/backgrounds/1b5.jpeg';updateCore('assets/music/synth/cores/1c5.jpeg');spawn4('assets/music/synth/sprites/1p5.jpeg');}
    if(s>=5)clearInterval(bgInt);
  },t);
}

    s++;
    if(s===1){document.getElementById('bg').src='assets/music/xray/backgrounds/2b2.jpeg';updateCore('assets/music/xray/cores/2c2.jpeg');spawn4('assets/music/xray/sprites/2p2.jpeg');}
    if(s===2){document.getElementById('bg').src='assets/music/xray/backgrounds/2b3.jpeg';updateCore('assets/music/xray/cores/2c3.jpeg');spawn4('assets/music/xray/sprites/2p3.jpeg');}
    if(s===3){document.getElementById('bg').src='assets/music/xray/backgrounds/2b4.jpeg';updateCore('assets/music/xray/cores/2c4.jpeg');spawn4('assets/music/xray/sprites/2p4.jpeg');}
    if(s===4){document.getElementById('bg').src='assets/music/xray/backgrounds/2b5.jpeg';updateCore('assets/music/xray/cores/2c5.jpeg');spawn4('assets/music/xray/sprites/2p5.jpeg');}
    if(s>=5)clearInterval(bgInt);
  },t);
}

    if(s===2){document.getElementById('bg').src='assets/music/volt/backgrounds/3b3.jpeg';updateCore('assets/music/volt/cores/3c3.jpeg');spawn4('assets/music/volt/sprites/3p3.jpeg');}

audio.onended=()=>{stopLoops();document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));};
</script>

<script>
if('serviceWorker'in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>0);});
}
</script>
</body>
</html>
