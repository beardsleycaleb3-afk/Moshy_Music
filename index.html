<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Moshy_Music</title>
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#splash{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
#splash h1{font-size:2.8rem;margin-bottom:1.5rem}
#splash p{font-size:1.6rem;color:#0f0;padding:1rem;border:3px solid #0f0;border-radius:12px}
#frame{display:none;flex-direction:column;height:100vh;border:10px solid var(--accent)}
#visual{flex:1;position:relative;background:#000;overflow:hidden}
.layer{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none}
#bg{opacity:1}
#gl-canvas{position:absolute;inset:0}
#particles{position:absolute;inset:0;pointer-events:none}
#hud{height:80px;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:8px;background:#111}
.btn{border:8px solid var(--accent);border-radius:50%;background:#000;color:var(--accent);font-size:24px;font-weight:bold;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.btn.active{background:var(--accent);color:#000}
:root{--accent:#fff}
</style>
</head>
<body>

<div id="splash">
  <h1>TOUCH HERE FOR A GOOD TIME</h1>
  <p ontouchstart="startApp()" onclick="startApp()">TAP IT GENTLY</p>
</div>

<div id="frame">
  <div id="visual">
    <img id="bg" class="layer">
    <canvas id="gl-canvas"></canvas>
    <canvas id="particles"></canvas>
  </div>
  <div id="hud">
    <div class="btn" ontouchstart="play(1)">©</div>
    <div class="btn" ontouchstart="play(2)">°</div>
    <div class="btn" ontouchstart="play(3)">∆</div>
    <div class="btn" ontouchstart="play(4)">•</div>
    <div class="btn" ontouchstart="play(5)">®</div>
  </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
let scene,camera,renderer,core,analyser,dataArray,audioCtx,source;
const loader = new THREE.TextureLoader();
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let particles = [];
const MAX_PART = 64;
const PHI = 1.6180339887;

function startApp(){
  document.getElementById('splash').style.display='none';
  document.getElementById('frame').style.display='flex';
  initThree();
  initAudio();
  if(audio.paused) audio.play().catch(()=>0);
}

function initThree(){
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
  camera.position.z = 5;
  renderer = new THREE.WebGLRenderer({canvas:document.getElementById('gl-canvas'),alpha:true});
  renderer.setSize(innerWidth,innerHeight);
  animateCore();
}

function updateCore(tex){
  if(core) scene.remove(core);
  core = new THREE.Mesh(new THREE.SphereGeometry(2.2,32,32),new THREE.MeshBasicMaterial({map:loader.load(tex)}));
  scene.add(core);
}

function animateCore(){
  requestAnimationFrame(animateCore);
  if(analyser)analyser.getByteFrequencyData(dataArray);
  const low  = dataArray.slice(0,20).reduce((a,b)=>a+b,0)/(20*255)||0;
  const mid  = dataArray.slice(20,60).reduce((a,b)=>a+b,0)/(40*255)||0;
  const high = dataArray.slice(60).reduce((a,b)=>a+b,0)/((dataArray.length-60)*255)||0;
  if(core){
    core.material.color.setRGB(low,mid,high);
    core.scale.setScalar(1 + low*0.8 + mid*0.4);
    core.rotation.y += 0.008 + low*0.03;
    core.rotation.x += 0.003 + high*0.02;
  }
  renderer.render(scene,camera);
}

function initAudio(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
}

class SpriteParticle {
  constructor(x,y,src,level=0,dir=0){
    this.img=new Image();this.img.src=src;
    this.x=x;this.y=y;this.level=level;
    this.size=90*Math.pow(PHI,level);
    this.life=110-level*12;
    this.alpha=1;
    this.angle=dir*(Math.PI/2);
    this.spin=0.035;
    this.radius=20+level*15;
    this.speed=1.8+level*0.4;
  }
  update(){
    this.angle+=this.spin;
    this.radius+=this.speed;
    this.x=innerWidth/2+Math.cos(this.angle)*this.radius;
    this.y=innerHeight/2+Math.sin(this.angle)*this.radius;
    this.alpha-=0.009;this.life--;
    if(this.level<3&&this.life%22===0&&particles.length<MAX_PART){
      for(let d=0;d<4;d++) particles.push(new SpriteParticle(this.x,this.y,this.img.src,this.level+1,d));
    }
  }
  draw(){
    if(!this.img.complete)return;
    pCtx.globalAlpha=this.alpha;
    pCtx.save();
    pCtx.translate(this.x,this.y);
    pCtx.rotate(this.angle);
    pCtx.drawImage(this.img,-this.size/2,-this.size/2,this.size,this.size);
    pCtx.restore();
  }
}

function spawn4(src){
  for(let d=0;d<4;d++){
    if(particles.length>=MAX_PART)break;
    particles.push(new SpriteParticle(innerWidth/2,innerHeight/2,src,0,d));
  }
}

function animateP(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  if(analyser)analyser.getByteFrequencyData(dataArray);
  const energy = dataArray.reduce((a,b)=>a+b,0)/(dataArray.length*255)||0;
  if(energy>0.35&&Math.random()<0.08) spawn4(document.getElementById('bg').src.replace('b','p').replace('backgrounds','sprites'));
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.update();
    if(p.alpha>0.02&&p.life>0)p.draw();
    else particles.splice(i,1);
  }
  requestAnimationFrame(animateP);
}
animateP();

let bgInt;
function stopLoops(){clearInterval(bgInt);}

function play(n){
  stopLoops();
  let folder,mp3,bpm,accent;
  switch(n){
    case 1: folder='synth'; mp3='1'; bpm=87; accent='#00ffff'; break;
    case 2: folder='xray'; mp3='2'; bpm=87; accent='#ff00ff'; break;
    case 3: folder='volt'; mp3='3'; bpm=87; accent='#ffff00'; break;
    case 4: folder='grid'; mp3='4'; bpm=73; accent='#00ff00'; break;
    case 5: folder='horror'; mp3='5'; bpm=123; accent='#ff0000'; break;
  }
  document.documentElement.style.setProperty('--accent',accent);
  document.querySelectorAll('.btn').forEach(b=>b.classList.toggle('active',b.innerText===['©','°','∆','•','®'][n-1]));
  audio.src=`assets/music/\( {folder}/ \){mp3}.mp3`; audio.play();
  document.getElementById('bg').src=`assets/music/\( {folder}/backgrounds/ \){mp3}b1.jpeg`;
  updateCore(`assets/music/\( {folder}/cores/ \){mp3}c1.jpeg`);
  spawn4(`assets/music/\( {folder}/sprites/ \){mp3}p1.jpeg`);
  let i=0;
  bgInt = setInterval(()=>{
    i=(i+1)%5;
    document.getElementById('bg').src=`assets/music/\( {folder}/backgrounds/ \){mp3}b${i+1}.jpeg`;
    updateCore(`assets/music/\( {folder}/cores/ \){mp3}c${i+1}.jpeg`);
    spawn4(`assets/music/\( {folder}/sprites/ \){mp3}p${i+1}.jpeg`);
  },60000/bpm*4);
}

audio.onended=()=>{stopLoops();document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));};
</script>

<script>
if('serviceWorker'in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>0);});
}
</script>
</body>
</html>
